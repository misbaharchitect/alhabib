#  spring.docker.compose.service.connection-name.grafana-lgtm=otlp
spring:
  application:
    name: otelms
  docker:
    compose:
      enabled: true
      file: compose.yaml
      service:
        connection-name:
          grafana-lgtm: otlp

management:
  otlp:
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs

  tracing:
    sampling:
      probability: 1.0

server:
  port: 8081
  shutdown: immediate
logging:
  level:
    com.example.otel: INFO
    org.springframework.boot.actuator.autoconfigure.opentelemetry: DEBUG
    org.springframework.boot.docker.compose: DEBUG
