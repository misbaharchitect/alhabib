spring:
  application:
    name: userms-client

  cloud:
    circuitbreaker:
      http-services:
        enabled: true # Enables the native adapter integration


server:
  port: 8082

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
  instance:
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15
    prefer-ip-address: false
    hostname: localhost

# Actuator (to visualize circuit breaker states)
management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

